name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # Required for secretless OIDC auth with PyPi

jobs:
  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify Version Sync
        run: |
          TAG_VERSION=${{ github.event.release.tag_name }}
          TAG_VERSION=${TAG_VERSION#v}
          FILE_VERSION=$(grep -m 1 '^version = ' pyproject.toml | tr -d '"' | tr -d "'" | awk '{print $3}')
          
          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "::error::Version mismatch! Tag is $TAG_VERSION but pyproject.toml is $FILE_VERSION."
            exit 1
          fi
          echo "✅ Versions are in sync."

  call-test-workflow:
    needs: version-check
    uses: ./.github/workflows/test.yml

  deploy:
    needs: [version-check, call-test-workflow]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build package
        run: |
          pip install build
          python -m build
      - name: Publish to PyPI
        # Secretless OIDC auth with PyPi - https://docs.pypi.org/trusted-publishers/
        uses: pypa/gh-action-pypi-publish@release/v1